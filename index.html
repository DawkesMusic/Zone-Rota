<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dawkes Zone Rota</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #D83D96;
    --dark: #1a1a1a;
    --mid: #2e2e2e;
    --border: #3a3a3a;
    --text: #f0f0f0;
    --muted: #888;
    --z1: #2D6A9F;
    --z2: #2A7A4B;
    --z3: #8B4513;
    --z4: #6B3A8B;
    --lead: #D83D96;
    --cover: #888;
    --off: #333;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  .header {
    background: var(--mid);
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { display: flex; align-items: baseline; gap: 10px; }
  .logo-text { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 22px; color: var(--text); letter-spacing: -0.5px; }
  .logo-sub { font-size: 11px; color: var(--pink); font-weight: 500; letter-spacing: 2px; text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .week-nav { display: flex; align-items: center; gap: 10px; }
  .week-nav button { background: var(--border); border: none; color: var(--text); width: 32px; height: 32px; border-radius: 6px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .week-nav button:hover { background: var(--pink); }
  .week-label { font-size: 13px; font-weight: 600; color: var(--text); min-width: 140px; text-align: center; }
  .sync-status { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  .sync-dot.synced { background: #4CAF50; }
  .sync-dot.syncing { background: var(--pink); animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .events-bar { background: #222; border-bottom: 1px solid var(--border); padding: 8px 28px; display: flex; align-items: center; gap: 24px; overflow-x: auto; }
  .events-label { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); white-space: nowrap; min-width: 120px; }
  .events-days { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; flex: 1; }
  .event-cell { position: relative; }
  .event-chip { background: #333; border: 1px dashed var(--border); border-radius: 4px; padding: 4px 8px; font-size: 11px; color: var(--muted); text-align: center; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: all 0.15s; min-height: 26px; display: flex; align-items: center; justify-content: center; }
  .event-chip:hover { border-color: var(--pink); color: var(--text); }
  .event-chip.has-event { background: rgba(216,61,150,0.15); border: 1px solid var(--pink); color: var(--pink); font-weight: 500; }

  .table-wrap { overflow-x: auto; padding: 20px 28px 40px; }
  table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 800px; }
  th { padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); background: var(--dark); position: sticky; top: 61px; z-index: 10; }
  th.day-col { text-align: center; }
  td { padding: 6px 8px; border-bottom: 1px solid #252525; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .member-cell { min-width: 160px; padding-left: 12px; }
  .member-name { font-weight: 600; font-size: 14px; color: var(--text); }
  .member-desc { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .zone-cell { text-align: center; min-width: 100px; }
  .chip-wrap { display: flex; align-items: center; justify-content: center; }
  .zone-chip { display: inline-flex; align-items: center; justify-content: center; padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; white-space: nowrap; min-width: 80px; font-family: 'DM Mono', monospace; letter-spacing: 0.3px; }
  .zone-chip:hover { opacity: 0.85; transform: scale(1.04); }
  .chip-off { background: transparent; border: 1.5px dashed var(--border); color: var(--border); }
  .chip-off:hover { border-color: var(--muted); color: var(--muted); }
  .chip-z1 { background: rgba(45,106,159,0.25); border-color: var(--z1); color: #7ab8e8; }
  .chip-z2 { background: rgba(42,122,75,0.25); border-color: var(--z2); color: #7ed8a4; }
  .chip-z3 { background: rgba(139,69,19,0.25); border-color: var(--z3); color: #e8a87a; }
  .chip-z4 { background: rgba(107,58,139,0.25); border-color: var(--z4); color: #c49fe8; }
  .chip-lead { background: rgba(216,61,150,0.2); border-color: var(--lead); color: #f080c0; }
  .chip-cover { background: rgba(136,136,136,0.15); border-color: #555; color: #aaa; font-style: italic; }

  .dropdown-wrap { position: relative; display: inline-block; }
  .dropdown { position: absolute; top: calc(100% + 4px); left: 50%; transform: translateX(-50%); background: #2a2a2a; border: 1px solid var(--border); border-radius: 8px; padding: 4px; z-index: 200; min-width: 120px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
  .dropdown-item { padding: 7px 12px; font-size: 12px; font-weight: 500; border-radius: 5px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.1s; font-family: 'DM Mono', monospace; }
  .dropdown-item:hover { background: rgba(255,255,255,0.07); }
  .dropdown-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #2a2a2a; border: 1px solid var(--border); border-radius: 12px; padding: 24px; min-width: 300px; max-width: 400px; width: 90%; }
  .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--text); }
  .modal input { width: 100%; background: var(--dark); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.15s; }
  .modal input:focus { border-color: var(--pink); }
  .modal-btns { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
  .btn { padding: 8px 18px; border-radius: 6px; border: none; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--pink); color: white; }
  .btn-ghost { background: var(--border); color: var(--text); }
  .btn-danger { background: #c0392b; color: white; }

  .legend { display: flex; gap: 16px; padding: 0 28px 20px; flex-wrap: wrap; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .legend-chip { width: 32px; height: 18px; border-radius: 9px; border: 1.5px solid; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: #2a2a2a; border: 1px solid var(--border); border-left: 3px solid var(--pink); border-radius: 8px; padding: 10px 16px; font-size: 13px; color: var(--text); z-index: 400; opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 600px) {
    .header { padding: 12px 16px; }
    .table-wrap { padding: 12px 8px 32px; }
    .legend { padding: 0 16px 16px; }
    .events-bar { padding: 8px 16px; }
  }
</style>
</head>
<body>
<div class="header">
  <div class="logo"><span class="logo-text">dawkes</span><span class="logo-sub">Zone Rota</span></div>
  <div class="header-right">
    <div class="week-nav">
      <button onclick="changeWeek(-1)">‹</button>
      <span class="week-label" id="weekLabel"></span>
      <button onclick="changeWeek(1)">›</button>
    </div>
    <div class="sync-status"><div class="sync-dot" id="syncDot"></div><span id="syncLabel">Syncing…</span></div>
  </div>
</div>
<div class="events-bar"><span class="events-label">Events</span><div class="events-days" id="eventsRow"></div></div>
<div class="legend">
  <span class="legend-item"><span class="legend-chip" style="background:rgba(45,106,159,0.25);border-color:#2D6A9F;color:#7ab8e8">Z1</span> Zone 1</span>
  <span class="legend-item"><span class="legend-chip" style="background:rgba(42,122,75,0.25);border-color:#2A7A4B;color:#7ed8a4">Z2</span> Zone 2</span>
  <span class="legend-item"><span class="legend-chip" style="background:rgba(139,69,19,0.25);border-color:#8B4513;color:#e8a87a">Z3</span> Zone 3</span>
  <span class="legend-item"><span class="legend-chip" style="background:rgba(107,58,139,0.25);border-color:#6B3A8B;color:#c49fe8">Z4</span> Zone 4</span>
  <span class="legend-item"><span class="legend-chip" style="background:rgba(216,61,150,0.2);border-color:#D83D96;color:#f080c0">Ld</span> Lead</span>
  <span class="legend-item"><span class="legend-chip" style="background:rgba(136,136,136,0.15);border-color:#555;color:#aaa;font-style:italic">Cv</span> Cover</span>
  <span class="legend-item"><span class="legend-chip" style="background:transparent;border-color:#3a3a3a;color:#3a3a3a">–</span> Off</span>
  <span style="margin-left:auto;font-size:11px;color:var(--muted)">Click any zone to change</span>
</div>
<div class="table-wrap">
  <table id="rotaTable">
    <thead><tr><th style="min-width:160px">Team Member</th><th class="day-col" id="th0"></th><th class="day-col" id="th1"></th><th class="day-col" id="th2"></th><th class="day-col" id="th3"></th><th class="day-col" id="th4"></th><th class="day-col" id="th5"></th></tr></thead>
    <tbody id="rotaBody"></tbody>
  </table>
</div>
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <h3 id="modalTitle">Edit Event</h3>
    <input type="text" id="modalInput" placeholder="Event name (leave blank to clear)" />
    <div class="modal-btns">
      <button class="btn btn-danger" onclick="clearEvent()">Clear</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEvent()">Save</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const STORAGE_PREFIX = 'dawkes_rota_shared_';
const TEAM = [
  { name: 'Jon',    desc: 'Saturdays – Sales Lead' },
  { name: 'Alison', desc: 'Mon–Fri, Zone 1, 9:15–15:15' },
  { name: 'Matt',   desc: 'Mon–Fri, Zone 2' },
  { name: 'Chris',  desc: 'Mon–Sat (Fri off), Zone 2' },
  { name: 'Tibor',  desc: 'Mon–Sat (Tue off), rotation' },
  { name: 'Josh',   desc: 'Mon–Sat (Thu off), rotation' },
  { name: 'Carl',   desc: 'Mon, Tue, Sat' },
  { name: 'Adam',   desc: 'Mon–Sat (Sat off)' },
  { name: 'Olivia', desc: 'Wed, Fri, Sat' },
  { name: 'Elena',  desc: 'Saturdays only' },
];
const ZONE_OPTIONS = [
  { value: 'off',   label: '–',        cls: 'chip-off' },
  { value: 'z1',    label: 'Zone 1',   cls: 'chip-z1' },
  { value: 'z2',    label: 'Zone 2',   cls: 'chip-z2' },
  { value: 'z3',    label: 'Zone 3',   cls: 'chip-z3' },
  { value: 'z4',    label: 'Zone 4',   cls: 'chip-z4' },
  { value: 'lead',  label: 'Lead',     cls: 'chip-lead' },
  { value: 'cover', label: 'Z3 cover', cls: 'chip-cover' },
];
const ZONE_COLORS = { off:'#3a3a3a', z1:'#2D6A9F', z2:'#2A7A4B', z3:'#8B4513', z4:'#6B3A8B', lead:'#D83D96', cover:'#555' };
function mondayOf(d) { const date=new Date(d); const day=date.getDay(); date.setDate(date.getDate()+(day===0?-6:1-day)); date.setHours(0,0,0,0); return date; }
function weekKey(date) { const d=mondayOf(date); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function weekDays(monday) { return Array.from({length:6},(_,i)=>{ const d=new Date(monday); d.setDate(d.getDate()+i); return d; }); }
function fmtShort(d) { return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}); }
const SEED_WEEK_KEY = weekKey(new Date('2026-04-20'));
const SEED_DATA = { events:['','','','','','Open Mic Night'], rows:{ Jon:['off','off','off','off','off','lead'], Alison:['z1','z1','z1','z1','z1','off'], Matt:['z2','z2','z2','z2','z2','off'], Chris:['z2','z2','z3','cover','off','z2'], Tibor:['z4','off','z4','z4','z2','z4'], Josh:['z3','z3','off','off','z3','z3'], Carl:['off','z2','off','off','off','z2'], Adam:['off','off','off','z2','off','off'], Olivia:['z1','off','z2','off','z1','z1'], Elena:['off','off','off','off','off','z1'] } };
let currentWeekStart=mondayOf(new Date()); let openDropdown=null; let modalDayIndex=null; let syncTimer=null; let weekData=null;
async function loadWeekData(wk) { try { const r=await window.storage.get(STORAGE_PREFIX+wk,true); if(r&&r.value) return JSON.parse(r.value); } catch(e){} return wk===SEED_WEEK_KEY?JSON.parse(JSON.stringify(SEED_DATA)):{events:['','','','','',''],rows:{}}; }
async function saveWeekData(wk,data) { setSyncState('syncing'); try { await window.storage.set(STORAGE_PREFIX+wk,JSON.stringify(data),true); setSyncState('synced'); } catch(e){ setSyncState('error'); } }
function setSyncState(s) { const dot=document.getElementById('syncDot'); const lbl=document.getElementById('syncLabel'); dot.className='sync-dot'; if(s==='synced'){dot.classList.add('synced');lbl.textContent='Saved';}else if(s==='syncing'){dot.classList.add('syncing');lbl.textContent='Saving…';}else{lbl.textContent='Offline';} }
async function loadAndRender() { setSyncState('syncing'); weekData=await loadWeekData(weekKey(currentWeekStart)); setSyncState('synced'); render(); }
function getCell(n,i) { if(!weekData.rows[n]) weekData.rows[n]=['off','off','off','off','off','off']; return weekData.rows[n][i]||'off'; }
function setCell(n,i,v) { if(!weekData.rows[n]) weekData.rows[n]=['off','off','off','off','off','off']; weekData.rows[n][i]=v; scheduleSave(); }
function scheduleSave() { if(syncTimer) clearTimeout(syncTimer); setSyncState('syncing'); syncTimer=setTimeout(()=>saveWeekData(weekKey(currentWeekStart),weekData),600); }
function render() {
  const days=weekDays(currentWeekStart);
  const s=days[0].toLocaleDateString('en-GB',{day:'numeric',month:'short'}); const e=days[5].toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  document.getElementById('weekLabel').textContent=s+' – '+e;
  days.forEach((d,i)=>document.getElementById('th'+i).textContent=fmtShort(d));
  const evRow=document.getElementById('eventsRow'); evRow.innerHTML='';
  days.forEach((d,i)=>{ const ev=weekData.events[i]||''; const div=document.createElement('div'); div.className='event-cell'; const chip=document.createElement('div'); chip.className='event-chip'+(ev?' has-event':''); chip.textContent=ev||'+'; chip.onclick=()=>openModal(i,ev,fmtShort(d)); div.appendChild(chip); evRow.appendChild(div); });
  const tbody=document.getElementById('rotaBody'); tbody.innerHTML='';
  TEAM.forEach(m=>{ const tr=document.createElement('tr'); const ntd=document.createElement('td'); ntd.className='member-cell'; ntd.innerHTML='<div class="member-name">'+m.name+'</div><div class="member-desc">'+m.desc+'</div>'; tr.appendChild(ntd); days.forEach((_,i)=>{ const td=document.createElement('td'); td.className='zone-cell'; td.innerHTML=renderChip(m.name,i,getCell(m.name,i)); tr.appendChild(td); }); tbody.appendChild(tr); });
}
function renderChip(name,dayIdx,value) { const opt=ZONE_OPTIONS.find(o=>o.value===value)||ZONE_OPTIONS[0]; return '<div class="chip-wrap"><div class="dropdown-wrap" id="dw-'+name+'-'+dayIdx+'"><div class="zone-chip '+opt.cls+'" onclick="toggleDropdown(\''+name+'\','+dayIdx+',event)">'+opt.label+'</div></div></div>'; }
function toggleDropdown(name,dayIdx,event) { event.stopPropagation(); const id=name+'-'+dayIdx; if(openDropdown===id){closeDropdown();return;} closeDropdown(); openDropdown=id; const wrap=document.getElementById('dw-'+name+'-'+dayIdx); const dd=document.createElement('div'); dd.className='dropdown'; dd.id='active-dropdown'; ZONE_OPTIONS.forEach(opt=>{ const item=document.createElement('div'); item.className='dropdown-item'; item.innerHTML='<span class="dropdown-dot" style="background:'+ZONE_COLORS[opt.value]+'"></span>'+opt.label; item.onclick=(e)=>{ e.stopPropagation(); setCell(name,dayIdx,opt.value); closeDropdown(); wrap.closest('td').innerHTML=renderChip(name,dayIdx,opt.value); showToast(name+' → '+opt.label); }; dd.appendChild(item); }); wrap.appendChild(dd); setTimeout(()=>{ const r=dd.getBoundingClientRect(); if(r.bottom>window.innerHeight-10){dd.style.top='auto';dd.style.bottom='calc(100% + 4px)';} },0); }
function closeDropdown() { const dd=document.getElementById('active-dropdown'); if(dd) dd.remove(); openDropdown=null; }
document.addEventListener('click',closeDropdown);
function changeWeek(dir) { currentWeekStart=new Date(currentWeekStart); currentWeekStart.setDate(currentWeekStart.getDate()+dir*7); loadAndRender(); }
function openModal(dayIdx,current,dayLabel) { modalDayIndex=dayIdx; document.getElementById('modalTitle').textContent='Event — '+dayLabel; document.getElementById('modalInput').value=current; document.getElementById('modalOverlay').classList.add('open'); setTimeout(()=>document.getElementById('modalInput').focus(),100); }
function closeModal(event) { if(event&&event.target!==document.getElementById('modalOverlay')) return; document.getElementById('modalOverlay').classList.remove('open'); }
function saveEvent() { const val=document.getElementById('modalInput').value.trim(); weekData.events[modalDayIndex]=val; scheduleSave(); document.getElementById('modalOverlay').classList.remove('open'); render(); showToast(val?'Event added: '+val:'Event cleared'); }
function clearEvent() { weekData.events[modalDayIndex]=''; scheduleSave(); document.getElementById('modalOverlay').classList.remove('open'); render(); showToast('Event cleared'); }
document.getElementById('modalInput').addEventListener('keydown',e=>{ if(e.key==='Enter') saveEvent(); if(e.key==='Escape') document.getElementById('modalOverlay').classList.remove('open'); });
let toastTimer;
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2000); }
async function seedIfNeeded() { try { const r=await window.storage.get(STORAGE_PREFIX+SEED_WEEK_KEY,true); if(!r) await window.storage.set(STORAGE_PREFIX+SEED_WEEK_KEY,JSON.stringify(SEED_DATA),true); } catch(e){} }
(async()=>{ await seedIfNeeded(); await loadAndRender(); })();
</script>
</body>
</html>
